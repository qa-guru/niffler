server:
  port: 9000
  error:
    whitelabel:
      enabled: false
    path: /error
  servlet:
    session:
      timeout: 60m
      cookie:
        name: JSESSIONID
        max-age: 3600
      tracking-modes: cookie

spring:
  application:
    name: niffler-auth
  mvc:
    log-request-details: true
  datasource:
    hikari:
      pool-name: ${spring.application.name}-pool
      connection-timeout: 20000
      minimum-idle: 15
      maximum-pool-size: 15
      idle-timeout: 300000
      max-lifetime: 1800000
      keepalive-time: 120000
      leak-detection-threshold: 30000
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    schemas: public
    locations: classpath:db/migration/niffler-auth
  session:
    timeout: 60m
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    generate-ddl: true
    open-in-view: false
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 365d
logging:
  level:
    root: INFO
    org.springframework.kafka: INFO
    org.springframework.web: INFO
    org.springframework.web.cors: INFO
    org.springframework.security.web.csrf: INFO
    org.springframework.security.web.authentication.logout: INFO
    org.springframework.security.web.webauthn: TRACE
    org.springframework.security: INFO
    org.springframework.web.servlet.handler: INFO
    org.springframework.web.servlet.DispatcherServlet: INFO
    org.springframework.security.oauth2: INFO
    org.springframework.security.oauth2.server.authorization: INFO
    org.apache.catalina.filters.RequestDumperFilter: INFO
    org.springframework.boot.autoconfigure: INFO
    org.apache.coyote.http11.Http11Processor: INFO

---
spring:
  config:
    activate:
      on-profile: 'local'
  kafka:
    bootstrap-servers: 'localhost:9092'
  datasource:
    url: 'jdbc:postgresql://localhost:5432/niffler-auth'
    username: postgres
    password: secret
niffler-front:
  base-uri: 'http://localhost:3000'
niffler-auth:
  base-uri: 'http://localhost:9000'
  rp-id: 'localhost'
oauth2:
  web-client-id: 'client'
  mobile-client-id: 'mobile-client'
  mobile-custom-scheme: 'app://'
  android-app-uri: 'ru.niffler_android'
webauthn:
  enabled: true
---
spring:
  config:
    activate:
      on-profile: 'docker'
  kafka:
    bootstrap-servers: 'kafka:9092'
  datasource:
    url: 'jdbc:postgresql://niffler-all-db:5432/niffler-auth'
    username: postgres
    password: secret
niffler-front:
  base-uri: 'http://frontend.niffler.dc'
niffler-auth:
  base-uri: 'http://auth.niffler.dc:9000'
  rp-id: 'http host not supported'
oauth2:
  web-client-id: 'client'
  mobile-client-id: 'mobile-client'
  mobile-custom-scheme: 'app://'
  android-app-uri: 'ru.niffler_android'
webauthn:
  enabled: false
---
spring:
  config:
    activate:
      on-profile: 'prod'
  kafka:
    bootstrap-servers: ${AUTH_KAFKA_URL}
  datasource:
    url: ${AUTH_DB_URL}
    username: ${AUTH_DB_USERNAME}
    password: ${AUTH_DB_PASSWORD}

server:
  tomcat:
    remoteip:
      port-header: 'x-forwarded-for'
      protocol-header: 'x-forwarded-proto'

niffler-front:
  base-uri: 'https://niffler.qa.guru'
niffler-auth:
  base-uri: 'https://auth.niffler.qa.guru'
  rp-id: 'niffler.qa.guru'
oauth2:
  web-client-id: ${AUTH_WEB_CLIENT_ID}
  mobile-client-id: ${AUTH_MOBILE_CLIENT_ID}
  mobile-custom-scheme: ${AUTH_MOBILE_CUSTOM_SCHEME}
  android-app-uri: ${AUTH_ANDROID_APP_URI}
webauthn:
  enabled: true
---
spring:
  config:
    activate:
      on-profile: 'staging'
  kafka:
    bootstrap-servers: ${AUTH_KAFKA_URL}
  datasource:
    url: ${AUTH_DB_URL}
    username: ${AUTH_DB_USERNAME}
    password: ${AUTH_DB_PASSWORD}

server:
  tomcat:
    remoteip:
      port-header: 'x-forwarded-for'
      protocol-header: 'x-forwarded-proto'

niffler-front:
  base-uri: 'https://niffler-stage.qa.guru'
niffler-auth:
  base-uri: 'https://auth.niffler-stage.qa.guru'
  rp-id: 'niffler-stage.qa.guru'
oauth2:
  web-client-id: ${AUTH_WEB_CLIENT_ID}
  mobile-client-id: ${AUTH_MOBILE_CLIENT_ID}
  mobile-custom-scheme: ${AUTH_MOBILE_CUSTOM_SCHEME}
  android-app-uri: ${AUTH_ANDROID_APP_URI}
webauthn:
  enabled: true
---
