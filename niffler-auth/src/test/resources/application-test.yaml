spring:
  autoconfigure:
    exclude:
      - 'org.springframework.cloud.vault.config.VaultAutoConfiguration'
      - 'org.springframework.cloud.vault.config.VaultObservationAutoConfiguration'
      - 'org.springframework.cloud.vault.config.VaultReactiveAutoConfiguration'
      - 'org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration'
  datasource:
    driverClassName: org.h2.Driver
    url: 'jdbc:h2:mem:niffler-auth;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DB_CLOSE_ON_EXIT=FALSE'
    username: sa
    password:
  sql:
    init:
      mode: always
  jpa:
    generate-ddl: false
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
  kafka:
    bootstrap-servers: 'localhost:9999'
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: never

niffler-front:
  base-uri: 'http://localhost:3000'
niffler-auth:
  base-uri: 'http://localhost:9000'
  rp-id: 'localhost'
oauth2:
  web-client-id: 'client'
  mobile-client-id: 'mobile-client'
  mobile-custom-scheme: 'app://'
  android-app-uri: 'ru.niffler_android'
webauthn:
  enabled: false
