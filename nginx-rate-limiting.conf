# Nginx rate limiting конфигурация для защиты от DoS
# Добавить в основной nginx.conf файл фронтенда

# Зоны ограничений
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=static:10m rate=100r/m;

# Ограничения соединений
limit_conn_zone $binary_remote_addr zone=perip:10m;
limit_conn_zone $server_name zone=perserver:10m;

server {
    listen 80;
    server_name localhost;
    
    # Общие ограничения
    limit_conn perip 10;
    limit_conn perserver 100;
    
    # Размер буферов для защиты от больших запросов
    client_max_body_size 1m;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    
    # Таймауты
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 15;
    send_timeout 10;
    
    # API endpoints с жестким лимитом
    location /api/auth {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://auth.niffler.dc:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://gateway.niffler.dc:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # Статические файлы с умеренным лимитом
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        limit_req zone=static burst=20 nodelay;
        expires 1y;
        add_header Cache-Control "public, immutable";
        root /usr/share/nginx/html;
    }
    
    # Основные страницы
    location / {
        limit_req zone=static burst=15 nodelay;
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
    
    # Блокировка вредоносных запросов
    location ~ /\. {
        deny all;
    }
    
    # Блокировка доступа к системным файлам
    location ~* \.(env|log|ini|conf|yaml|yml)$ {
        deny all;
    }
}