[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers
markers =
    web: Web UI tests using browser automation
    api: API tests using HTTP requests
    graphql: GraphQL API tests
    smoke: Smoke tests for critical functionality
    regression: Full regression test suite
    slow: Tests that take longer to execute
    debug: Keep browser open after test for manual inspection
    skip: Skip test execution (use @pytest.mark.skip or @pytest.mark.skipif)
    staging: Tests that should run on staging environment
    production: Tests safe to run on production
    local: Tests for local development only

# Command line options
addopts =
    -v
    --strict-markers
    --tb=short
    --alluredir=allure-results

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
log_level = DEBUG
log_file = logs/test.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
